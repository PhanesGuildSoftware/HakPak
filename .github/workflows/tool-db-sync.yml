name: Tool DB Sync Check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  tool-db-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source and staged tool DB are synced
        run: ./scripts/check-tool-db-sync.sh
